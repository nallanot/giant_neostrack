services:
  fittrackee-db:
    image: ${POSTGIS_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - fittrackee-db-nfs:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fittrackee_internal

  fittrackee-redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - fittrackee-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fittrackee_internal

  fittrackee:
    image: ${FITTRACKEE_IMAGE}
    restart: unless-stopped
    depends_on:
      fittrackee-db:
        condition: service_healthy
      fittrackee-redis:
        condition: service_healthy
    command: >
      sh -c "
      mkdir -p /usr/src/app/logs /usr/src/app/uploads /usr/src/app/.staticmap_cache
      && sleep 5
      && sh docker-entrypoint.sh
      "
    environment:
      APP_SETTINGS: fittrackee.config.ProductionConfig
      FLASK_APP: fittrackee
      FLASK_SKIP_DOTENV: "1"

      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@fittrackee-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://fittrackee-redis:6379

      UI_URL: ${FITTRACKEE_PUBLIC_URL}
      HOST: 0.0.0.0
      PORT: 5000

      APP_SECRET_KEY: ${FITTRACKEE_APP_SECRET_KEY}
      SECURITY_PASSWORD_SALT: ${FITTRACKEE_SECURITY_PASSWORD_SALT}

      UPLOAD_FOLDER: /usr/src/app/uploads
      APP_LOG: /usr/src/app/logs/fittrackee.log
      GUNICORN_LOG: /usr/src/app/logs/gunicorn.log
      DRAMATIQ_LOG: /usr/src/app/logs/dramatiq.log
      STATICMAP_CACHE_DIR: /usr/src/app/.staticmap_cache
      TASKS_TIME_LIMIT: ${FITTRACKEE_TASKS_TIME_LIMIT}

      TILE_SERVER_URL: ${TILE_SERVER_URL}
      STATICMAP_SUBDOMAINS: ${STATICMAP_SUBDOMAINS}
      MAP_ATTRIBUTION: ${MAP_ATTRIBUTION}

      HOME: /tmp
    volumes:
      - fittrackee-uploads-nfs:/usr/src/app/uploads
      - fittrackee-logs-nfs:/usr/src/app/logs
      - fittrackee-cache-nfs:/usr/src/app/.staticmap_cache
      - neostrack-data-nfs:/neostrack:rw
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('127.0.0.1', 5000), 5).close()\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.fittrackee.rule=Host(`${FITTRACKEE_HOST}`)
      - traefik.http.routers.fittrackee.entrypoints=${TRAEFIK_HTTPS_ENTRYPOINT}
      - traefik.http.routers.fittrackee.tls=true
      - traefik.http.routers.fittrackee.tls.certresolver=${TRAEFIK_CERTRESOLVER}
      - traefik.http.services.fittrackee.loadbalancer.server.port=5000
    networks:
      - traefik_default
      - fittrackee_internal

  fittrackee-workers:
    image: ${FITTRACKEE_IMAGE}
    restart: unless-stopped
    depends_on:
      fittrackee-db:
        condition: service_healthy
      fittrackee-redis:
        condition: service_healthy
    command: >
      sh -c "
      mkdir -p /usr/src/app/logs /usr/src/app/uploads /usr/src/app/.staticmap_cache
      && dramatiq fittrackee.tasks:broker --processes=${FITTRACKEE_WORKER_PROCESSES} --log-file=/usr/src/app/logs/dramatiq.log
      "
    environment:
      APP_SETTINGS: fittrackee.config.ProductionConfig
      FLASK_APP: fittrackee
      FLASK_SKIP_DOTENV: "1"

      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@fittrackee-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://fittrackee-redis:6379

      UI_URL: ${FITTRACKEE_PUBLIC_URL}
      APP_SECRET_KEY: ${FITTRACKEE_APP_SECRET_KEY}
      SECURITY_PASSWORD_SALT: ${FITTRACKEE_SECURITY_PASSWORD_SALT}

      UPLOAD_FOLDER: /usr/src/app/uploads
      APP_LOG: /usr/src/app/logs/fittrackee.log
      DRAMATIQ_LOG: /usr/src/app/logs/dramatiq.log
      STATICMAP_CACHE_DIR: /usr/src/app/.staticmap_cache
      TASKS_TIME_LIMIT: ${FITTRACKEE_TASKS_TIME_LIMIT}

      HOME: /tmp
    volumes:
      - fittrackee-uploads-nfs:/usr/src/app/uploads
      - fittrackee-logs-nfs:/usr/src/app/logs
      - fittrackee-cache-nfs:/usr/src/app/.staticmap_cache
    networks:
      - fittrackee_internal

  neostrack-api:
    image: ${NEOSTRACK_IMAGE}
    restart: unless-stopped
    working_dir: /app
    depends_on:
      fittrackee:
        condition: service_healthy
    command: >
      sh -c "
      pip install --no-cache-dir flask requests fitdecode
      && python /app/app.py
      "
    environment:
      PYTHONUNBUFFERED: "1"

      FITTRACKEE_URL: http://fittrackee:5000
      FITTRACKEE_EMAIL: ${FITTRACKEE_EMAIL}
      FITTRACKEE_USERNAME: ${FITTRACKEE_USERNAME}
      FITTRACKEE_PASSWORD: ${FITTRACKEE_PASSWORD}
      FITTRACKEE_SPORT_ID: ${FITTRACKEE_SPORT_ID}
    volumes:
      - neostrack-app-nfs:/app
      - neostrack-data-nfs:/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.neostrack.rule=Host(`${NEOSTRACK_HOST}`) && PathPrefix(`/`)
      - traefik.http.routers.neostrack.entrypoints=${NEOSTRACK_ENTRYPOINT}
      - traefik.http.routers.neostrack.priority=${NEOSTRACK_ROUTER_PRIORITY}
      - traefik.http.services.neostrack.loadbalancer.server.port=5000
    networks:
      - traefik_default
      - fittrackee_internal

networks:
  traefik_default:
    external: true
    name: ${TRAEFIK_NETWORK}

  fittrackee_internal:
    driver: bridge

volumes:
  fittrackee-db-nfs:
    driver: local
    driver_opts:
      type: nfs
      o: ${NFS_OPTIONS}
      device: :${NFS_ROOT}/fittrackee/db

  fittrackee-uploads-nfs:
    driver: local
    driver_opts:
      type: nfs
      o: ${NFS_OPTIONS}
      device: :${NFS_ROOT}/fittrackee/uploads

  fittrackee-logs-nfs:
    driver: local
    driver_opts:
      type: nfs
      o: ${NFS_OPTIONS}
      device: :${NFS_ROOT}/fittrackee/logs

  fittrackee-cache-nfs:
    driver: local
    driver_opts:
      type: nfs
      o: ${NFS_OPTIONS}
      device: :${NFS_ROOT}/fittrackee/cache

  neostrack-app-nfs:
    driver: local
    driver_opts:
      type: nfs
      o: ${NFS_OPTIONS}
      device: :${NFS_ROOT}/neostrack/app

  neostrack-data-nfs:
    driver: local
    driver_opts:
      type: nfs
      o: ${NFS_OPTIONS}
      device: :${NFS_ROOT}/neostrack/data

  fittrackee-redis-data:
    driver: local
